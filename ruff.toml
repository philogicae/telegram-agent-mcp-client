[lint]
select = ["ALL"]
exclude = [
    ".git/**",
    "__pycache__/**",
    "*.pyc",
    ".venv/**",
    "build/**",
    "dist/**",
]
ignore = [
    "ANN204",   # Missing return type annotation for special method - Allow omitting returns in __init__
    "ANN401",   # Dynamically typed expressions (typing.Any) - Allow Any for flexibility
    "ARG004",   # Unused static method argument - Allow unused args in static methods
    "ARG005",   # Unused lambda argument - Allow unused args in lambdas for callbacks
    "ASYNC240", # Async functions should not use pathlib.Path methods
    "ASYNC250", # Blocking call to `input()` in async context
    "B905",     # zip() without an explicit strict= parameter - Allow zip without strict for compatibility
    "BLE001",   # Do not catch blind exception - TODO: Should be fixed in future refactoring
    "C901",     # Too complex - Allow complex functions for readability
    "COM812",   # Missing trailing comma - Allow no trailing commas for cleaner code
    "D102",     # Missing docstring in public method - Allow omitting docstrings for simple methods
    "D105",     # Missing docstring in magic method - Allow omitting docstrings in magic methods
    "D203",     # one-blank-line-before-class (incompatible with D211) - Use D211 instead
    "D205",     # 1 blank line required between summary line and description - Allow compact docstrings
    "D212",     # multi-line-summary-first-line (incompatible with D213) - Use D213 instead
    "D401",     # First line of docstring should be in imperative mood - Allow flexible docstring style
    "D107",     # Missing docstring in __init__ - Allow omitting docstrings in __init__ when obvious
    "E402",     # Module level import not at top of file - Allow imports outside of top level
    "E501",     # Line too long - Allow longer lines for readability
    "EM101",    # Exception must not use a string literal - Allow string messages in exceptions
    "EM102",    # Exception must not use an f-string literal - Allow f-strings in exceptions
    "ERA001",   # Found commented-out code - Allow commented-out code
    "FBT001",   # Boolean-typed positional argument - Allow boolean flags as positional args
    "FBT002",   # Boolean default positional argument - Allow boolean defaults in functions
    "FIX002",   # Line contains TODO - Allow TODO comments
    "G004",     # Logging statement uses f-string - Allow f-strings in logging for convenience
    "G201",     # Logging .exception(...) should be used instead of .error(..., exc_info=True) - Allow .error with exc_info
    "PGH003",   # Use specific rule codes when ignoring type issues - Allow general type: ignore comments
    "PLC0415",  # Import should be at the top-level of a file - Allow conditional imports
    "PLR0912",  # Too many branches - Allow multiple branches for complex logic
    "PLR0913",  # Too many arguments - Allow functions with many parameters when needed
    "PLR0915",  # Too many statements - Allow long functions for complex operations
    "PLR2004",  # Magic value used in comparison - Allow magic numbers for clarity
    "RUF022",   # __all__ is not sorted - Allow custom ordering of exports
    "S104",     # Possible binding to all interfaces - Allow binding to 0.0.0.0 for servers
    "S311",     # Standard pseudo-random generators are not suitable for cryptographic purposes - Allow random() for jitter
    "SIM102",   # Use a single if statement instead of nested if - Allow nested ifs for clarity
    "SIM103",   # Return the condition directly - Allow explicit if/else for readability
    "T201",     # print found - Allow print statements throughout the codebase
    "TC001",    # Move application import into a type-checking block - Allow runtime imports
    "TC002",    # Move third-party import into a type-checking block - Allow runtime imports
    "TC003",    # Move standard library import into a type-checking block - Allow runtime imports
    "TD002",    # Missing author in TODO - Allow TODO without author
    "TD003",    # Missing issue link on the line following this TODO - Allow TODO without link
    "TID252",   # Prefer absolute imports over relative imports from parent modules - Allow relative imports
    "TRY003",   # Avoid specifying long messages outside the exception class - Allow custom error messages
    "TRY300",   # Consider moving this statement to an else block - Allow try/except/else patterns
    "TRY301",   # Abstract raise to an inner function - Allow direct raises in try blocks
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]      # Allow unused imports in __init__ files
"config/**/*.py" = ["INP001"] # Allow missing __init__.py files in config

[format]
quote-style = "double" # Use double quotes for strings
indent-style = "space" # Use spaces for indentation (not tabs)
line-ending = "lf"     # Use LF line endings (Unix style)
